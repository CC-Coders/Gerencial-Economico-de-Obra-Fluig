<header></header>
  <div style="display: flex;">

    <aside style="width: 25%;">
      <app-menu  (selectMenu)="changeActiveMenu($event)" [activeMenu]="activeMenu" />
    </aside>
    <main style="width: 75%;">

      
      @if(activeMenu == "Dados Gerais"){
        <app-dados-gerais/>
      }
      @if(activeMenu == "Producao"){
        <app-producao/>
      }
      @if(activeMenu == "Despesas Economicas"){
        <app-despesas-economicas/>
      }
      @if(activeMenu == "Estoque"){
        <app-estoque/>
      }
      @if(activeMenu == "Despesas Indiretas"){
        <app-despesas-indiretas/>
      }
      @if(activeMenu == "Efetivo"){
        <app-efetivo/>
      }
      @if(activeMenu == "Faturamento"){
        <app-faturamento/>
      }

    </main>    
    
  </div>



<footer>
  <button type="button" class="btn btn-primary" id="btnSend" (click)="saveAndSend()">Enviar</button>
</footer>
