<header></header>
  <div style="display: flex;">

    <aside style="width: 25%;">
      <app-menu  (selectMenu)="changeActiveMenu($event)" [activeMenu]="activeMenu" />
    </aside>
    <main style="width: 100%;">

      
      @if(activeMenu == "Dados Gerais"){
        <app-dados-gerais/>
      }
      @if(activeMenu == "Producao"){
        <app-producao/>
      }

    </main>    
    
  </div>



<footer>
  <button type="button" class="btn btn-primary" id="btnSend" (click)="saveAndSend()">Enviar</button>
</footer>
