<div id="producao">
    <div>
        <h1 style="display: flex; justify-content: space-between;">
            <div>
                <mat-icon style="color:#ffcd2a">engineering</mat-icon>
                Apontamento de Produção
            </div>
            <b>Total: {{valorTotal | currency:"BRL"}}</b>
        </h1>
    </div>
    <div>
        @for(grupo of grupos; track grupo){
            <app-producao-table [grupo]="grupo"/>
        }
        <input type="text" name="percentAplicado" id="percentAplicado" [(ngModel)]="percentAplicado">
        <button class="btn btn-primary" (click)="onLancarValorTeste()">Lancar valores teste</button>
    </div>
</div>
