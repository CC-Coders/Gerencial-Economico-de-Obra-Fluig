<div>
    <table class="table table-bordered">

        <thead>
            <tr>
                @for(column of columns; track $index){
                <th>{{column}}</th>
                }
            </tr>
        </thead>
        <tbody>
            @for(row of data; track $index){
            <ng-container [ngTemplateOutlet]="rowTemplate"
                [ngTemplateOutletContext]="{ $implicit: row, index: $index }">
            </ng-container>
            }
        </tbody>

    </table>
</div>
