<html>

<head>
	<!-- Fluig -->
	<link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide-flat.min.css" />
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
	<script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
	<script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>

	<!-- Material Icon -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

	<!-- Angular -->
	<link rel="stylesheet" href="app-angular/browser/styles.css">

	<style>
		body{
			padding-bottom: 0px !important;
		}
	</style>
	    <script>
          parent.$(".workflow-actions").hide();
    </script>
</head>

<body>
	<div class="fluig-style-guide">
		<form name="form" role="form">
			<div style="display: none;">
				<input type="hidden" name="atividade" id="atividade">
				<input type="hidden" name="formMode" id="formMode">
				<input type="hidden" name="isMobile" id="isMobile">
				<input type="hidden" name="userCode" id="userCode">


				<input type="hidden" name="decisao" id="decisao">
			    <input type="hidden" name="CODCOLIGADA" id="CODCOLIGADA">
    			<input type="hidden" name="CODCCUSTO" id="CODCCUSTO">
    			<input type="hidden" name="IDPRJ" id="IDPRJ">
    			<input type="hidden" name="IDPERIODO" id="IDPERIODO">

				<div>
					<table id="tableProducao" tablename="tableProducao">
						<thead>
							<tr>
								<th>CODTAREFA</th>
								<th>DESCRICAO</th>
								<th>UN</th>
								<th>QUANTIDADE</th>
								<th>Valor Un</th>
								<th>Valor Total</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td><input type="hidden" name="cod_grupo" id="cod_grupo" class="cod_grupo"></td>
								<td><input type="hidden" name="id_tarefa" id="id_tarefa" class="id_tarefa"></td>
								<td><input type="hidden" name="cod_tarefa" id="cod_tarefa" class="cod_tarefa"></td>
								<td><input type="hidden" name="des_tarefa" id="des_tarefa" class="descricao_tarefa"></td>
								<td><input type="hidden" name="un_medida" id="un_medida" class="un_tarefa"></td>
								<td><input type="hidden" name="quantidade" id="quantidade" class="quantidade_medida_tarefa"></td>
								<td><input type="hidden" name="vlr_unitario" id="vlr_unitario" class="valor_unitario_tarefa"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>

			<app-root></app-root>

			<script src="app-angular/browser/main.js" type="module"></script>


		</form>
	</div>
</body>

</html>
